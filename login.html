<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">   
    <link rel="stylesheet" href="estilo/style.css">
    <script src="https://kit.fontawesome.com/54fc0ed631.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css">
    <title>Document</title>
    <style>

        body {
            background: url("img/familia.png");

            
             
        }
        header.loginC {
            background: none;
        }

        main.corpo {
            margin-top: -400px;
            text-align: center;
        }

        article {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        input {
            padding: 20px;
            width: 350px;
            outline-color: #1e3a8a;
            border: 1px solid gray;
            border-radius: 7px;
            margin-top: 10px;
            font-size: 1.1em;

        }

        button {
            padding: 20px;
            width: 350px;
            border: 1px solid  #1e3a8a;
            border-radius: 7px;
            margin-top: 10px;
            font-size: 1.1em;
            background-color: #1e3a8a;
            color: #FFFFFF;
            cursor: pointer;

        }

        div.conta {
            margin-top: 5px;
            text-align:  center;
            color: #FFFFFF;
        }

        h1 {
            color: #1e3a8a;
            text-align: center;
            margin-bottom: 20px;
        }

        div.caixa {
            text-align: center; 
        }



    
    </style>
</head>
<body>
    <header class="loginC">
        <div id="menufixo">
        <div id="ico">
            <i class="fa-solid fa-book-open fa-xl" style="color: #FFFFFF;"></i> 
            <span>InforSchool</span>
        
        </div> 
        </div> 
    </header>

    <main class="corpo">
        <article>
            <h1>InforSchool</h1>
            <form action="#">
            <input type="email" placeholder="Email ou Usuário" required> <br>
            <input type="password" placeholder="Senha" required> <br>
            <button type="submit">Entrar</button>
            </form>
            <div class="conta">
                Esqueceu a senha? - Criar conta
            </div>

        </article>
        
        

    </main>
    
</body>
</html>
